<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD Engineering Platform - Live Telemetry</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #121214; color: #e1e1e6; padding: 20px; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { color: #ff9f1c; border-bottom: 2px solid #2a2a30; padding-bottom: 10px; margin-bottom: 20px; }
        .grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full-width { background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 15px; margin-top: 20px; }
        .panel { background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 20px; min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; }
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-connected { background: #2ec4b6; color: #011627; }
        .status-disconnected { background: #e71d36; color: #ffffff; }
        .log-box { background: #0a0a0c; border: 1px solid #222; height: 250px; overflow-y: auto; padding: 10px; border-radius: 4px; font-size: 13px; }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #19191e; }
        .event-name { color: #2ec4b6; font-weight: bold; }
        .score-high { color: #2ec4b6; font-size: 24px; font-weight: bold; }
        pre { margin: 5px 0 0 0; background: #111; padding: 5px; border-radius: 3px; color: #a9a9b3; font-size: 11px; }
        canvas { background: #0a0a0c; border: 1px solid #2a2a30; border-radius: 4px; width: 100%; height: 280px; }
        #stlCanvas { background: #000; border: 2px dashed #ff9f1c; border-radius: 4px; height: 320px; width: 100%; position: relative; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 13px; color: #ff9f1c; margin-bottom: 4px; }
        .control-group input[type="range"] { width: 100%; }
        .btn { background: #ff9f1c; color: #121214; border: none; padding: 10px 15px; border-radius: 4px; font-family: 'Consolas', monospace; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: #2ec4b6; color: #011627; }
    </style>
    <!-- Core Three.js Engine, OrbitControls, and STLLoader dependencies -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div class="container">
        <h1>⚙️ OpenSCAD Engineering Platform Telemetry Dashboard</h1>
        <div style="margin-bottom: 20px;">
            Connection Status: <span id="connectionStatus" class="status-tag status-disconnected">OFFLINE</span>
        </div>
        
        <div class="grid-three">
            <!-- Column 1: Configuration Parameters -->
            <div class="panel">
                <h3>📋 Parametric Workspace Overrides</h3>
                <div id="statsPanel">Waiting for live cluster mutations...</div>
                
                <div class="control-group" style="margin-top:20px;">
                    <label>Wall Thickness: <span id="val_wall">4.5</span>mm</label>
                    <input type="range" id="param_wall" min="1.0" max="10.0" step="0.5" value="4.5" oninput="document.getElementById('val_wall').innerText=this.value">
                </div>
                <div class="control-group">
                    <label>Bore Clearance: <span id="val_clear">0.6</span>mm</label>
                    <input type="range" id="param_clear" min="0.1" max="4.0" step="0.1" value="0.6" oninput="document.getElementById('val_clear').innerText=this.value">
                </div>
                <div class="control-group">
                    <label>Roller Radius: <span id="val_radius">32.0</span>mm</label>
                    <input type="range" id="param_radius" min="10.0" max="100.0" step="1.0" value="32.0" oninput="document.getElementById('val_radius').innerText=this.value">
                </div>
                
                <button class="btn" onclick="injectManualTask()">Inject Parameter Matrix Task</button>
            </div>
            
            <!-- Column 2: Chart Analytics Viewport -->
            <div class="panel">
                <h3>📈 Optimization Performance Curve</h3>
                <canvas id="performanceChart"></canvas>
            </div>
            
            <!-- Column 3: Live 3D Viewport -->
            <div class="panel">
                <h3>体积 3D CAD Preview</h3>
                <div id="stlCanvas"></div>
                <div style="font-size:11px; color:#a9a9b3; text-align:center; margin-top: 5px;">Use mouse scroll to zoom, left click drag to rotate 3D view.</div>
            </div>
        </div>

        <!-- Full Width Grid Bottom Row: Logger Stream -->
        <div class="full-width">
            <h3>📡 Real-Time Event Stream</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById('logBox');
        const statusTag = document.getElementById('connectionStatus');
        const statsPanel = document.getElementById('statsPanel');
        const canvas = document.getElementById('performanceChart');
        const ctx = canvas.getContext('2d');
        
        let ws; 
        let scoreHistory = [];
        canvas.width = 450; 
        canvas.height = 260;

        let scene, camera, renderer, currentMesh, controls;
        const stlContainer = document.getElementById('stlCanvas');

        function init3DViewport() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050507);
            
            camera = new THREE.PerspectiveCamera(45, stlContainer.clientWidth / 320, 0.1, 1000);
            camera.position.set(0, 0, 140);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(stlContainer.clientWidth, 320);
            stlContainer.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            const ambientLight = new THREE.AmbientLight(0x404040, 2); 
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); 
            dirLight.position.set(1, 1, 1).normalize(); 
            scene.add(dirLight);

            function animate() {
                requestAnimationFrame(animate);
                if (currentMesh) currentMesh.rotation.y += 0.003;
                controls.update(); 
                renderer.render(scene, camera);
            }
            animate();
        }

        function loadSTLModel(machineName, revisionId) {
            const url = `http://localhost:8000/improve/download/${machineName}/${revisionId}`;
            const loader = new THREE.STLLoader();
            loader.load(url, function (geometry) {
                if (currentMesh) scene.remove(currentMesh);
                geometry.center();
                const material = new THREE.MeshStandardMaterial({ color: 0xff9f1c, roughness: 0.4, metalness: 0.2 });
                currentMesh = new THREE.Mesh(geometry, material);
                currentMesh.rotation.x = -Math.PI / 2;
                scene.add(currentMesh);
            });
        }

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 1;
            
            for(let i = 1; i < 5; i++) {
                let y = canvas.height - (i * (canvas.height / 5));
                ctx.beginPath(); 
                ctx.moveTo(0, y); 
                ctx.lineTo(canvas.width, y); 
                ctx.stroke();
            }
            
            if (scoreHistory.length === 0) return;
            
            ctx.strokeStyle = '#ff9f1c'; 
            ctx.lineWidth = 3; 
            ctx.beginPath();
            
            const step = scoreHistory.length > 1 ? canvas.width / (scoreHistory.length - 1) : canvas.width;
            
            scoreHistory.forEach((score, index) => {
                let x = index * step; 
                let y = canvas.height - (score * canvas.height * 0.9) - 10;
                if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            scoreHistory.forEach((score, index) => {
                let x = index * step; 
                let y = canvas.height - (score * canvas.height * 0.9) - 10;
                ctx.fillStyle = '#2ec4b6'; 
                ctx.beginPath(); 
                ctx.arc(x, y, 5, 0, 2 * Math.PI); 
                ctx.fill();
            });
        }

              function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8000/ws');
            
            ws.onopen = () => {
                statusTag.className = "status-tag status-connected";
                statusTag.innerText = "CONNECTED";
            };

            ws.onclose = () => {
                statusTag.className = "status-tag status-disconnected";
                statusTag.innerText = "OFFLINE";
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 1. Create and insert the log entry text
                const logEntry = document.createElement('div');
                logEntry.className = "log-entry";
                logEntry.innerHTML = `<span class="event-name">[${data.status || 'EVENT'}]</span> Candidate performance score verified: <span class="score-high">${data.score || '0.00'}</span>`;
                
                // 2. Append parameters code block if they exist
                if(data.parameters) {
                    const paramsPre = document.createElement('pre');
                    paramsPre.innerText = JSON.stringify(data.parameters, null, 2);
                    logEntry.appendChild(paramsPre);
                }
                
                // 3. Push log to the top of the event stream box
                logBox.insertBefore(logEntry, logBox.firstChild);
                
                // 4. Update performance history chart array
                if (data.score) {
                    scoreHistory.push(parseFloat(data.score));
                    if (scoreHistory.length > 20) scoreHistory.shift();
                    drawChart();
                }

                // 5. Load the new 3D model and update telemetry panel text
                if (data.machineName && data.revisionId) {
                    loadSTLModel(data.machineName, data.revisionId);
                    statsPanel.innerHTML = `<strong>Active Machine:</strong> ${data.machineName}<br><strong>Revision ID:</strong> ${data.revisionId}`;
                }
            };
        }

        function injectManualTask() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('WebSocket is currently disconnected.');
                return;
            }
            const task = {
                command: "inject_matrix",
                wall_thickness: parseFloat(document.getElementById('param_wall').value),
                bore_clearance: parseFloat(document.getElementById('param_clear').value),
                roller_radius: parseFloat(document.getElementById('param_radius').value)
            };
            ws.send(JSON.stringify(task));
        }

        window.onload = () => {
            init3DViewport();
            drawChart();
            connectWebSocket();
        };

        window.onresize = () => {
            if (renderer && camera) {
                renderer.setSize(stlContainer.clientWidth, 320);
                camera.aspect = stlContainer.clientWidth / 320;
                camera.updateProjectionMatrix();
            }
        };
