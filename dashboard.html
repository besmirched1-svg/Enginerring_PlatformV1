<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD Engineering Platform - Live Telemetry</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #121214; color: #e1e1e6; padding: 20px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #ff9f1c; border-bottom: 2px solid #2a2a30; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 15px; }
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-connected { background: #2ec4b6; color: #011627; }
        .status-disconnected { background: #e71d36; color: #ffffff; }
        .log-box { background: #0a0a0c; border: 1px solid #222; height: 500px; overflow-y: auto; padding: 10px; border-radius: 4px; font-size: 13px; }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #19191e; }
        .event-name { color: #2ec4b6; font-weight: bold; }
        .score-high { color: #2ec4b6; }
        .score-low { color: #ff9f1c; }
        pre { margin: 5px 0 0 0; background: #111; padding: 5px; border-radius: 3px; color: #a9a9b3; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ OpenSCAD Engineering Platform Telemetry Dashboard</h1>
        <div style="margin-bottom: 20px;">
            Connection Status: <span id="connectionStatus" class="status-tag status-disconnected">OFFLINE</span>
        </div>
        
        <div class="grid">
            <div class="panel">
                <h3>📋 System Overview</h3>
                <div id="statsPanel">Waiting for live cluster mutations...</div>
            </div>
            <div class="panel">
                <h3>📡 Real-Time Event Stream</h3>
                <div id="logBox" class="log-box"></div>
            </div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById('logBox');
        const statusTag = document.getElementById('connectionStatus');
        const statsPanel = document.getElementById('statsPanel');
        let ws;

        function connect() {
            ws = new WebSocket('ws://localhost:8000/ws/telemetry');
            
            ws.onopen = () => {
                statusTag.innerText = 'CONNECTED TO CLUSTER';
                statusTag.className = 'status-tag status-connected';
                logMessage('SYSTEM', 'Established structural data bridge to FastAPI core.');
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleEvent(message.event, message.data);
            };

            ws.onclose = () => {
                statusTag.innerText = 'OFFLINE';
                statusTag.className = 'status-tag status-disconnected';
                logMessage('SYSTEM', 'Data bridge closed. Retrying connection in 3 seconds...');
                setTimeout(connect, 3000);
            };
        }

        function handleEvent(eventName, data) {
            logMessage(eventName, JSON.stringify(data, null, 2), true);
            
            if (eventName === 'evaluation_complete' || eventName === 'revision_promoted') {
                const scoreClass = data.score >= 0.75 ? 'score-high' : 'score-low';
                statsPanel.innerHTML = `
                    <p><strong>Target Machine:</strong> ${data.machine_name}</p>
                    <p><strong>Active Revision:</strong> <span class="event-name">${data.revision_id || 'N/A'}</span></p>
                    <p><strong>Current Score:</strong> <span class="${scoreClass}">${data.score}</span></p>
                    <p><em>Last update captured via WebSocket event framework.</em></p>
                `;
            }
        }

        function logMessage(event, text, isJson = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            
            if (isJson) {
                entry.innerHTML = `[${timestamp}] <span class="event-name">${event}</span>:<pre>${text}</pre>`;
            } else {
                entry.innerHTML = `[${timestamp}] <strong>${event}</strong>: ${text}`;
            }
            
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        connect();
    </script>
</body>
</html>
