<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenSCAD Engineering Platform - Dashboard</title>
  <style>
    body { background:#0f1113; color:#e6eef6; font-family:system-ui,Segoe UI,Roboto,Arial; margin:0; padding:18px; }
    .top { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
    .status-badge { padding:6px 10px; border-radius:6px; font-weight:600; }
    .status-indicator { margin-left:12px; }
    .status-off { background:#3a3f44; color:#fff; }
    .status-online { background:#2ecc71; color:#07210a; }
    .container { display:grid; grid-template-columns: 1fr 360px; gap:12px; align-items:start; }
    .card { background:#0b0c0d; border:1px solid #222; padding:12px; border-radius:8px; }
    #event-log { height:420px; overflow:auto; background:#070708; padding:10px; border-radius:6px; font-family:monospace; font-size:13px; color:#dfe7ee; }
    button { background:#1abc9c; color:#04221a; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
    .small { font-size:13px; color:#9aa6b2; }
    .title { margin:0; font-size:18px; }
    .card h2 { margin-top:0; font-size:15px; }
    .card h3 { margin-top:0; font-size:14px; }
    .button-container { margin-left:auto; }
    .spacer { height:12px; }
  </style>
</head>
<body>
  <div class="top">
    <h1 class="title">OpenSCAD Engineering Platform</h1>
    <div id="status-indicator" class="status-badge status-off status-indicator">OFFLINE</div>
    <div class="button-container">
      <button id="btn-test">Inject telemetry test</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Live Event Stream</h2>
      <div id="event-log"></div>
    </div>

    <div class="card">
      <h2>Upload Workspace File</h2>
      <input id="upload-input" type="file" multiple style="width:100%; margin-top:8px;" />
      <div class="spacer"></div>
      <button id="btn-upload">Upload to Workspace</button>
      <div id="upload-status" class="small" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h3>Quick Info</h3>
      <div class="small">Socket.IO namespaces: <code>/optimizer</code> <code>/swarm</code> <code>/cad</code> <code>/planner</code></div>
      <div class="spacer"></div>
      <div class="small">Open the console (F12) to see raw logs.</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    (function () {
      const logEl = document.getElementById('event-log');
      const status = document.getElementById('status-indicator');

      function appendLog(channel, type, data) {
        const ts = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.innerHTML = '<span style="color:#9aa6b2">[' + ts + ']</span> <b style="color:#fff">' + channel + '</b> ' + '<span style="color:#7fd3b6">' + type + '</span> ' + '<span style="color:#cfe8ff"> ' + (typeof data === "object" ? JSON.stringify(data) : String(data)) + '</span>';
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      // Use current origin so it works on localhost:9000 or other host/port
      const origin = window.location.origin;

      // Create socket.io connections
      const optimizer = io(origin + '/optimizer');
      const swarm = io(origin + '/swarm');
      const cad = io(origin + '/cad');
      const planner = io(origin + '/planner');

      // Generic attach helper
      function attach(socket, name, handlers) {
        socket.on('connect', () => {
          appendLog(name, 'connect', {});
          status.className = 'status-badge status-online';
          status.textContent = 'ONLINE';
          console.log('[dashboard] connected');
        });
        socket.on('disconnect', () => {
          appendLog(name, 'disconnect', {});
          status.className = 'status-badge status-off';
          status.textContent = 'OFFLINE';
          console.log('[dashboard] disconnected');
        });
        for (const ev of handlers) {
          socket.on(ev, (d) => {
            appendLog(name, ev, d);
            console.log(name, ev, d);
          });
        }
      }

      attach(optimizer, 'optimizer', ['mutation', 'score_update']);
      attach(swarm, 'swarm', ['agent_message']);
      attach(cad, 'cad', ['stl_ready']);
      attach(planner, 'planner', ['reasoning_step']);

      // Test button triggers backend test endpoint
      document.getElementById('btn-test').addEventListener('click', () => {
        fetch(origin + '/telemetry/test')
          .then(r => r.json())
          .then(j => {
            appendLog('ui', 'test_sent', j);
            console.log('telemetry test response', j);
          })
          .catch(err => {
            appendLog('ui', 'test_error', String(err));
            console.error(err);
          });
      });

      document.getElementById('btn-upload').addEventListener('click', async () => {
        const input = document.getElementById('upload-input');
        const status = document.getElementById('upload-status');
        const files = input.files;
        if (!files || files.length === 0) {
          appendLog('ui', 'upload_error', 'No files selected');
          status.textContent = 'Please select one or more files to upload.';
          return;
        }

        const form = new FormData();
        for (const file of files) {
          form.append('files', file);
        }

        status.textContent = 'Uploading...';
        try {
          const response = await fetch(origin + '/upload', {
            method: 'POST',
            body: form
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || response.statusText);
          }
          appendLog('ui', 'upload_success', payload);
          status.textContent = `Uploaded ${payload.files.length} file(s) to workspace.`;
        } catch (err) {
          appendLog('ui', 'upload_error', String(err));
          status.textContent = 'Upload failed; see console for details.';
        }
      });

      // Expose for debugging
      window.__dashboard = { optimizer, swarm, cad, planner };
      console.log('[dashboard] Socket.IO telemetry client initialized');
    })();
  </script>
</body>
</html>
