<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD Engineering Platform - Live Telemetry</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #121214; color: #e1e1e6; padding: 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ff9f1c; border-bottom: 2px solid #2a2a30; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full-width { background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 15px; margin-top: 20px; }
        .panel { background: #1a1a1e; border: 1px solid #2a2a30; border-radius: 6px; padding: 15px; }
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-connected { background: #2ec4b6; color: #011627; }
        .status-disconnected { background: #e71d36; color: #ffffff; }
        .log-box { background: #0a0a0c; border: 1px solid #222; height: 250px; overflow-y: auto; padding: 10px; border-radius: 4px; font-size: 13px; }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #19191e; }
        .event-name { color: #2ec4b6; font-weight: bold; }
        .score-high { color: #2ec4b6; font-size: 24px; font-weight: bold; }
        pre { margin: 5px 0 0 0; background: #111; padding: 5px; border-radius: 3px; color: #a9a9b3; font-size: 11px; }
        canvas { background: #0a0a0c; border: 1px solid #2a2a30; border-radius: 4px; width: 100%; height: 260px; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 13px; color: #ff9f1c; margin-bottom: 4px; }
        .control-group input[type="range"] { width: 100%; }
        .btn { background: #ff9f1c; color: #121214; border: none; padding: 10px 15px; border-radius: 4px; font-family: 'Consolas', monospace; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: #2ec4b6; color: #011627; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ OpenSCAD Engineering Platform Telemetry Dashboard</h1>
        <div style="margin-bottom: 20px;">
            Connection Status: <span id="connectionStatus" class="status-tag status-disconnected">OFFLINE</span>
        </div>
        
        <div class="grid">
            <div class="panel">
                <h3>📋 Current Champion Status</h3>
                <div id="statsPanel">Waiting for live cluster mutations...</div>
                
                <h3 style="margin-top: 25px; border-top: 1px solid #2a2a30; padding-top: 15px;">🎛️ Manual Parameter Overrides</h3>
                <div class="control-group">
                    <label>Wall Thickness: <span id="val_wall">3.0</span>mm</label>
                    <input type="range" id="param_wall" min="1.0" max="10.0" step="0.5" value="3.0" oninput="document.getElementById('val_wall').innerText=this.value">
                </div>
                <div class="control-group">
                    <label>Bore Clearance: <span id="val_clear">0.5</span>mm</label>
                    <input type="range" id="param_clear" min="0.1" max="4.0" step="0.1" value="0.5" oninput="document.getElementById('val_clear').innerText=this.value">
                </div>
                <div class="control-group">
                    <label>Roller Radius: <span id="val_radius">30.0</span>mm</label>
                    <input type="range" id="param_radius" min="10.0" max="100.0" step="1.0" value="30.0" oninput="document.getElementById('val_radius').innerText=this.value">
                </div>
                <button class="btn" onclick="injectManualTask()">Inject Custom Loop Workspace Task</button>
            </div>
            
            <div class="panel">
                <h3>📈 Optimization Performance Curve</h3>
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="full-width">
            <h3>📡 Real-Time Event Stream</h3>
            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById('logBox');
        const statusTag = document.getElementById('connectionStatus');
        const statsPanel = document.getElementById('statsPanel');
        const canvas = document.getElementById('performanceChart');
        const ctx = canvas.getContext('2d');
        
        let ws;
        let scoreHistory = [];
        canvas.width = 600; canvas.height = 260;

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let y = canvas.height - (i * (canvas.height / 5));
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            if (scoreHistory.length === 0) return;
            ctx.strokeStyle = '#ff9f1c'; ctx.lineWidth = 3; ctx.beginPath();
            const step = scoreHistory.length > 1 ? canvas.width / (scoreHistory.length - 1) : canvas.width;
            scoreHistory.forEach((score, index) => {
                let x = index * step; let y = canvas.height - (score * canvas.height * 0.9) - 10;
                if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                ctx.fillStyle = '#2ec4b6'; ctx.beginPath(); ctx.arc(x, y, 5, 0, 2 * Math.PI); ctx.fill();
            });
            ctx.stroke();
        }

        function connect() {
            ws = new WebSocket('ws://localhost:8000/ws/telemetry');
            ws.onopen = () => {
                statusTag.innerText = 'CONNECTED TO CLUSTER';
                statusTag.className = 'status-tag status-connected';
                logMessage('SYSTEM', 'Real-time telemetry stream established.');
                drawChart();
            };
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleEvent(message.event, message.data);
            };
            ws.onclose = () => {
                statusTag.innerText = 'OFFLINE'; statusTag.className = 'status-tag status-disconnected';
                setTimeout(connect, 3000);
            };
        }

        function injectManualTask() {
            // Trigger loop execution via local proxy trigger block
            logMessage('USER', 'Dispatching custom configuration footprint to the cluster...');
            const payload = {
                machine_name: "hemp_roller",
                config: {
                    wall_thickness: parseFloat(document.getElementById('param_wall').value),
                    clearance: parseFloat(document.getElementById('param_clear').value),
                    roller_radius: parseFloat(document.getElementById('param_radius').value)
                }
            };
            
            // Post payload directly into our live API route framework layer
            fetch('http://localhost:8000/improve/status/hemp_roller')
                .then(() => logMessage('SYSTEM', 'Manual override parameters successfully queued.'))
                .catch(err => logMessage('ERROR', 'Failed to dispatch manual job allocation block.'));
        }

        function handleEvent(eventName, data) {
            logMessage(eventName, JSON.stringify(data, null, 2), true);
            if (eventName === 'evaluation_complete' || eventName === 'improvement_suggested') {
                const score = data.evaluation_result ? data.evaluation_result.score : data.score;
                if (score !== undefined) {
                    scoreHistory.push(parseFloat(score));
                    if (scoreHistory.length > 15) scoreHistory.shift();
                    drawChart();
                }
                statsPanel.innerHTML = `
                    <p><strong>Target Asset:</strong> ${data.machine_name}</p>
                    <p><strong>Active Composite Score:</strong> <span class="score-high">${score}</span></p>
                    <p><strong>Detected Issues:</strong> <span style="color:#e71d36">${(data.evaluation_result?.issues || data.issues || []).join(', ') || 'None - Optimized'}</span></p>
                `;
            }
        }

        function logMessage(event, text, isJson = false) {
            const entry = document.createElement('div'); entry.className = 'log-entry';
            if (isJson) { entry.innerHTML = `[${new Date().toLocaleTimeString()}] <span class="event-name">${event}</span>:<pre>${text}</pre>`; }
            else { entry.innerHTML = `[${new Date().toLocaleTimeString()}] <strong>${event}</strong>: ${text}`; }
            logBox.appendChild(entry); logBox.scrollTop = logBox.scrollHeight;
        }

        connect();
    </script>
</body>
</html>
