<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD Engineering Platform</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #121214;
            color: #e1e1e6;
            font-family: Consolas, monospace;
        }

        .container {
            max-width: 1800px;
            margin: auto;
        }

        h1 {
            color: #ff9f1c;
            border-bottom: 2px solid #2a2a30;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            border-radius: 8px;
            padding: 20px;
            min-height: 420px;
        }

        .panel h2 {
            margin-top: 0;
            color: #ff9f1c;
        }

        #stlCanvas {
            width: 100%;
            height: 320px;
            border: 2px dashed #ff9f1c;
            border-radius: 6px;
            background: #050507;
        }

        canvas {
            width: 100%;
            height: 320px;
            background: #050507;
            border-radius: 6px;
        }

        .log-box {
            background: #0a0a0c;
            border: 1px solid #222;
            border-radius: 6px;
            height: 260px;
            overflow-y: auto;
            padding: 10px;
        }

        .log-entry {
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .event {
            color: #2ec4b6;
            font-weight: bold;
        }

        .score {
            color: #ff9f1c;
            font-weight: bold;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .offline {
            background: #e71d36;
            color: white;
        }

        .online {
            background: #2ec4b6;
            color: black;
        }

        .slider-group {
            margin-bottom: 20px;
        }

        .slider-group label {
            display: block;
            margin-bottom: 6px;
            color: #ff9f1c;
        }

        .slider-group input {
            width: 100%;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #ff9f1c;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2ec4b6;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>
</head>

<body>

<div class="container">

    <h1>⚙ OpenSCAD Engineering Platform</h1>

    <div>
        Connection Status:
        <span id="connectionStatus" class="status offline">
            OFFLINE
        </span>
    </div>

    <div class="grid">

        <!-- LEFT PANEL -->
        <div class="panel">

            <h2>📋 Parametric Controls</h2>

            <div class="slider-group">
                <label>
                    Wall Thickness:
                    <span id="wallValue">4.5</span>
                </label>

                <input
                    type="range"
                    id="wallThickness"
                    min="1"
                    max="10"
                    step="0.5"
                    value="4.5"
                    title="Wall Thickness"
                >
            </div>

            <div class="slider-group">
                <label for="boreClearance">
                    Bore Clearance:
                    <span id="clearanceValue">0.6</span>
                </label>

                <input
                    type="range"
                    id="boreClearance"
                    min="0.1"
                    max="4"
                    step="0.1"
                    value="0.6"
                    title="Bore Clearance"
                >
            </div>

            <div class="slider-group">
                <label for="rollerRadius">
                    Roller Radius:
                    <span id="radiusValue">32</span>
                </label>

                <input
                    type="range"
                    id="rollerRadius"
                    min="10"
                    max="100"
                    step="1"
                    value="32"
                    title="Roller Radius"
                >
            </div>

            <button onclick="injectTask()">
                Inject Optimization Task
            </button>

        </div>

        <!-- CENTER PANEL -->
        <div class="panel">

            <h2>📈 Optimization Curve</h2>

            <canvas id="chartCanvas"></canvas>

        </div>

        <!-- RIGHT PANEL -->
        <div class="panel">

            <h2>🧊 Live 3D CAD Preview</h2>

            <div id="stlCanvas"></div>

        </div>

    </div>

    <div class="panel" style="margin-top:20px; min-height:300px;">

        <h2>📡 Live Event Stream</h2>

        <div class="log-box" id="logBox"></div>

    </div>

</div>

<script>

const logBox = document.getElementById("logBox");
const statusBox = document.getElementById("connectionStatus");

const chartCanvas = document.getElementById("chartCanvas");
const chartCtx = chartCanvas.getContext("2d");

chartCanvas.width = 500;
chartCanvas.height = 300;

let ws;
let scores = [];

document.getElementById("wallThickness").oninput = function() {
    document.getElementById("wallValue").innerText = this.value;
};

document.getElementById("boreClearance").oninput = function() {
    document.getElementById("clearanceValue").innerText = this.value;
};

document.getElementById("rollerRadius").oninput = function() {
    document.getElementById("radiusValue").innerText = this.value;
};

function drawChart() {

    chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);

    chartCtx.strokeStyle = "#222";

    for (let i = 1; i < 5; i++) {

        let y = chartCanvas.height - (i * 60);

        chartCtx.beginPath();
        chartCtx.moveTo(0, y);
        chartCtx.lineTo(chartCanvas.width, y);
        chartCtx.stroke();
    }

    if (scores.length === 0) {
        return;
    }

    chartCtx.strokeStyle = "#ff9f1c";
    chartCtx.lineWidth = 3;
    chartCtx.beginPath();

    const step = chartCanvas.width / Math.max(scores.length - 1, 1);

    scores.forEach((score, index) => {

        const x = index * step;
        const y = chartCanvas.height - (score * 250);

        if (index === 0) {
            chartCtx.moveTo(x, y);
        } else {
            chartCtx.lineTo(x, y);
        }
    });

    chartCtx.stroke();
}

let scene;
let camera;
let renderer;
let controls;
let currentMesh;

function init3D() {

    const container = document.getElementById("stlCanvas");

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050507);

    camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / 320,
        0.1,
        1000
    );

    camera.position.set(0, 0, 140);

    renderer = new THREE.WebGLRenderer({
        antialias: true
    });

    renderer.setSize(container.clientWidth, 320);

    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(
        camera,
        renderer.domElement
    );

    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 1.2);
    directional.position.set(1, 1, 1);

    scene.add(directional);

    function animate() {

        requestAnimationFrame(animate);

        if (currentMesh) {
            currentMesh.rotation.y += 0.003;
        }

        controls.update();

        renderer.render(scene, camera);
    }

    animate();
}

function loadSTL(machineName, revisionId) {

    const loader = new THREE.STLLoader();

    const url =
        `http://localhost:8000/improve/download/${machineName}/${revisionId}`;

    loader.load(url, function(geometry) {

        if (currentMesh) {
            scene.remove(currentMesh);
        }

        geometry.center();

        const material = new THREE.MeshStandardMaterial({
            color: 0xff9f1c,
            roughness: 0.4,
            metalness: 0.2
        });

        currentMesh = new THREE.Mesh(geometry, material);

        currentMesh.rotation.x = -Math.PI / 2;

        scene.add(currentMesh);
    });
}

function addLog(message) {

    const div = document.createElement("div");

    div.className = "log-entry";

    div.innerHTML = message;

    logBox.prepend(div);
}

function connectWebSocket() {

    ws = new WebSocket("ws://localhost:8000/ws/telemetry");

    ws.onopen = function() {

        statusBox.className = "status online";
        statusBox.innerText = "CONNECTED";
    };

    ws.onclose = function() {

        statusBox.className = "status offline";
        statusBox.innerText = "OFFLINE";

        setTimeout(connectWebSocket, 3000);
    };

    ws.onmessage = function(event) {

        const data = JSON.parse(event.data);

        addLog(
            `<span class="event">[${data.status || "EVENT"}]</span>
            Score:
            <span class="score">${data.score || "0.00"}</span>`
        );

        if (data.score) {

            scores.push(parseFloat(data.score));

            if (scores.length > 20) {
                scores.shift();
            }

            drawChart();
        }

        if (data.machine_name && data.revision_id) {

            loadSTL(
                data.machine_name,
                data.revision_id
            );
        }
    };
}

function injectTask() {

    if (!ws || ws.readyState !== WebSocket.OPEN) {

        alert("WebSocket disconnected");

        return;
    }

    const task = {

        command: "inject_matrix",

        wall_thickness: parseFloat(
            document.getElementById("wallThickness").value
        ),

        bore_clearance: parseFloat(
            document.getElementById("boreClearance").value
        ),

        roller_radius: parseFloat(
            document.getElementById("rollerRadius").value
        )
    };

    ws.send(JSON.stringify(task));
}

window.onload = function() {

    init3D();

    drawChart();

    connectWebSocket();
};

window.onresize = function() {

    const container = document.getElementById("stlCanvas");

    if (renderer && camera) {

        renderer.setSize(container.clientWidth, 320);

        camera.aspect = container.clientWidth / 320;

        camera.updateProjectionMatrix();
    }
};

</script>

</body>
</html>
