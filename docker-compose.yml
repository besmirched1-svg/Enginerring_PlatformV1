x-env: &common-env
  ENGINEERING_REDIS_HOST: redis
  ENGINEERING_REDIS_PORT: 6379
  ENGINEERING_ENV: production
  ENGINEERING_DATA_DIR: /app/outputs

x-depends: &depends-redis
  depends_on:
    redis:
      condition: service_healthy

services:
  # Shared cache / message broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # FastAPI REST + WebSocket API
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      ENGINEERING_API_HOST: 0.0.0.0
      ENGINEERING_API_PORT: 8000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    <<: *depends-redis
    volumes:
      - platform_outputs:/app/outputs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Background worker for improvement controller and job queues
  worker:
    build: .
    command: python app/worker.py
    environment:
      <<: *common-env
      IMPROVEMENT_LOOP_ENABLED: "true"
    <<: *depends-redis
    volumes:
      - platform_outputs:/app/outputs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Agent committee and director (autonomous engineering intelligence)
  director:
    build: .
    command: python -m app.director
    environment:
      <<: *common-env
    <<: *depends-redis
    volumes:
      - platform_outputs:/app/outputs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Telemetry gateway for hardware feedback loop
  telemetry:
    build: .
    command: python -m app.runtime run --profile prod
    environment:
      <<: *common-env
    <<: *depends-redis
    volumes:
      - platform_outputs:/app/outputs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # (Optional) Backups service — runs scheduled backups
  backup:
    build: .
    command: python /app/scripts/backup_scheduler.py
    environment:
      <<: *common-env
    <<: *depends-redis
    volumes:
      - platform_outputs:/app/outputs
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  redis_data:
  platform_outputs:
