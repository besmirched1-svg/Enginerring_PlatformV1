services:
  # The FastAPI application layer
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
    depends_on:
      - redis

  # The distributed worker process running our improvement loop controller
  worker:
    build: .
    command: python app/worker.py
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IMPROVEMENT_LOOP_ENABLED=true
      - PYTHONPATH=/app
    depends_on:
      - redis

  # Shared cache/memory datastore used for atomic state coordination
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
